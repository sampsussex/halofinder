

run_options:
  run_hmf: true    # Set to true to run hmf.py
  run_lf: true     # Set to true to run lf.py
  run_mock_comparison: true  # Set to true to compare score to mock
  

cosmology:
  h: 0.704 # Little h value
  omega_matter: 0.27 # Omega matter value- Flat cosmology assumed so Omega_Lambda = 1 - Omega_matter


survey_fractional_sky_area: 0.0035 # 


column_names:
  galaxy_id: "GalID"  # For SHARKS data
  ra: "RA"
  dec: "DEC"
  redshift: "Zspec"
  absolute_magnitude: "Rpetro_abs"
  apparent_magnitude: "Rpetro"
  group_id: "HaloID"


file_locations:
  galaxy_catalog_path: '/Users/sp624AA/Downloads/mocks/GALFORM/G3CMockGalv04all_z_r_1965_processed.parquet' # Specify the loading path for the catalogue
  luminosity_function_path: "luminosity_function/schechter_fit_galform.dat" # Save location for the luminosity function dat file
  galaxy_group_path: "gal_groups_galform.dat"        # Save location for the galaxy group dat file
  s_tot_path: "s_tot_galform.dat"            # Save location for the S_tot dat file
  plots_dir: "plots/"           # Directory to save the plots


setup_options:
  b_threshold: 4 # Probability threshold for the group finder
  survey_magnitude_limit: 19.65  # Magnitude limit for the survey
  abs_solar_magnitude_in_band: 4.64  # Absolute solar magnitude
  max_iterations: 8  # Maximum number of iterations for the group finder
  remove_isolated_galaxies: False  # Set to true to remove isolated galaxies - only set up for SHARKS data


hmf_options:
  hmf_min_mass: 10  # Minimum mass for the HMF in log10(Msun)
  hmf_max_mass: 16  # Maximum mass for the HMF in log10(Msun)
  hmf_redshift: 0.1  # Redshift for the HMF calculation
  hmf_dlog10m: 0.01  # Logarithmic bin width for the HMF


mock_comparison_options:
  group_n_threshold: 5  # Minimum number of galaxies in a group for bijective matching